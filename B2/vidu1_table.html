<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ví dụ 1: Bảng</title>
    <style>
        table, th, td{
            border : 1px solid red;
        }
        th,td{
            padding : 10px;
        }
    </style>
</head>
<body>
    <h2>Basic HTML Table</h2>
    <table>
        <thead> 
            <tr>
                <th><b>Level1</b></th>
                <th><b>Level2</b></th>
                <th><b>Level3</b></th>
                <th><b>Info</b></th>
                <th><b>Name</b></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="6">System</td>
                <td rowspan="4">System Apps</td>
                <td rowspan="3">SystemEnv</td>
                <td>App Test</td>
                <td>foo</td>
            </tr>
            <tr>
                <td>App Memory</td>
                <td>fo</td>
            </tr>
            <tr>
                <td>App Test</td>
                <td>bar</td>
            </tr>
            <tr>
                <td>SystemEnv2</td>
                <td>App Test</td>
                <td>bar</td>
            </tr>
            <tr>
                <td rowspan="2">System Memory</td>
                <td rowspan="2">Memory Test</td>
                <td>Memory Func</td>
                <td>foo</td>
            </tr>
            <tr>
                <td>Apes Test</td>
                <td>foo</td>
            </tr>
        </tbody>
    </table>
    <p>&lt;table&gt;</p>
</body>
</html>
