<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table,
        th,
        td {
            border: 1px solid #ddd;
        }

        th,
        td {
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>Basic HTML Table 2</h2>
    <table>
        <head>
            <style>
                .center-text {
                    text-align: center;
                }

                .right-text {
                    text-align: right;
                }
            </style>
        </head>
        <tbody>
            <tr>
                <td rowspan="11"><b>TCB</b></td>
                <td><b>Order no:</b></td>
                <td colspan="3">#ABC001</td>
            </tr>
            <tr>
                <td><b>Order Date:</b></td>
                <td colspan="3">23-Mar-2016</td>
            </tr>
            <tr>
                <td colspan="4" class="center-text"><b>Customer</b></td>
            </tr>
            <tr>
                <td><b>Name:</b></td>
                <td colspan="3">John Papas</td>
            </tr>
            <tr>
                <td><b>Address:</b></td>
                <td colspan="3">Independence Dat 5th str, 11511</td>
            </tr>
            <tr>
                <td colspan="4" class="center-text"><b>Order Details</b></td>
            </tr>
            <tr>
                <td>1</td>
                <td>Of Mice and Men</td>
                <td>Book</td>
                <td>10.00$</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Les Miserable</td>
                <td>Book</td>
                <td>12.00%</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Game of Thromes</td>
                <td>DVD</td>
                <td>50.00$</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Samsung Galaxy</td>
                <td>Mobile Phone</td>
                <td>200.00$</td>
            </tr>
            <tr>
                <td colspan="3" class="right-text"><b>Total:</b></td>
                <td>272.00$</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
